<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Omaya — New discharge</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap"
            rel="stylesheet"
        />
        <template id="__bundler_thumbnail">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" fill="#F1E1E9" />
                <circle cx="30" cy="34" r="7" fill="#93406B" />
                <circle cx="50" cy="34" r="7" fill="#93406B" />
                <circle cx="70" cy="34" r="7" fill="#D8B9C8" />
                <rect x="26" y="33" width="48" height="2" fill="#93406B" />
                <rect
                    x="28"
                    y="52"
                    width="44"
                    height="7"
                    rx="3"
                    fill="#fff"
                    stroke="#E4E7EC"
                />
                <rect
                    x="28"
                    y="64"
                    width="44"
                    height="7"
                    rx="3"
                    fill="#fff"
                    stroke="#E4E7EC"
                />
            </svg>
        </template>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
            }
            :root {
                --ui-font: "Inter", system-ui, -apple-system, sans-serif;
            }
            * {
                box-sizing: border-box;
            }
            body {
                font-family: var(--ui-font);
                font-size: 14px;
                line-height: 1.6;
                background: #f5f6f8;
                color: #1e2d42;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            #root {
                width: 100vw;
                height: 100vh;
                height: 100dvh;
            }
            ::placeholder {
                color: #98a2b3;
            }
            input[type="date"] {
                color-scheme: light;
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>

        <script type="text/babel" src="dash-foundation.jsx"></script>
        <script type="text/babel" src="dash-ui.jsx"></script>
        <script type="text/babel" src="dash-components.jsx"></script>
        <script type="text/babel" src="discharge.jsx"></script>
        <script type="text/babel">
            function App() {
                const [scenario, setScenario] = React.useState("default");
                const Comp = window.DischargeApp;
                if (!Comp)
                    return (
                        <div style={{ padding: 40, fontFamily: "sans-serif" }}>
                            Initializing Omaya Enrollment...
                        </div>
                    );
                return <Comp scenario={scenario} onScenario={setScenario} />;
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>

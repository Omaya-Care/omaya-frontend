<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omaya — Message templates</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#E0E8F3" />
<rect x="28" y="20" width="44" height="60" rx="9" fill="#fff" stroke="#3C6BA8" stroke-width="2.5" />
<rect x="34" y="34" width="26" height="9" rx="4.5" fill="#3C6BA8" />
<rect x="40" y="49" width="26" height="9" rx="4.5" fill="#C9D6EA" />
<path d="M50 64s-5-3.2-5-6.8a2.8 2.8 0 0 1 5 -1.5 2.8 2.8 0 0 1 5 1.5c0 3.6-5 6.8-5 6.8z" fill="#3C6BA8" />
</svg>
</template>
<style>
  html, body { margin: 0; padding: 0; }
  :root { --ui-font: "Inter", system-ui, -apple-system, sans-serif; }
  body { font-family: var(--ui-font); font-size: 14px; line-height: 1.6; background: #f0eee9; color: #1E2D42; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  * { box-sizing: border-box; }
  #root { width: 100vw; height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="messages.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { PhoneCard, TEMPLATES } = window;

  const ABW = 360;
  const cardStyle = { height: "auto", border: "none", boxShadow: "none", background: "transparent" };

  function App() {
    return (
      <DesignCanvas>
        <DCSection id="messages" title="Omaya — what Ama receives"
          subtitle="Seven message templates · warm, plain, her name, exactly one action · works as SMS or WhatsApp">
          {TEMPLATES.map((t) => (
            <DCArtboard key={t.id} id={t.id} label={t.label} width={ABW} height={640} style={cardStyle}>
              <PhoneCard template={t} />
            </DCArtboard>
          ))}
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

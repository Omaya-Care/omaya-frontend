<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Omaya — Hospital Portal Sign-in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
<template id="__bundler_thumbnail">
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
<rect width="100" height="100" fill="#F1E1E9" />
<rect x="32" y="30" width="36" height="36" rx="9" fill="#7A2850" />
<g stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(35,33) scale(0.75)">
<path d="M20 35 C20 27 20 17 20 7" />
<path d="M20 11 C16.5 8.2 13.2 8.2 10.8 10.4" /><path d="M20 11 C23.5 8.2 26.8 8.2 29.2 10.4" />
<path d="M20 19 C15.2 16 11 16.4 8 19.4" /><path d="M20 19 C24.8 16 29 16.4 32 19.4" />
<path d="M20 27 C14.2 24 9.8 24.8 6.8 28.2" /><path d="M20 27 C25.8 24 30.2 24.8 33.2 28.2" />
</g>
</svg>
</template>
<style>
  html, body { margin: 0; padding: 0; }
  :root { --ui-font: "Inter", system-ui, -apple-system, sans-serif; }
  body { font-family: var(--ui-font); font-size: 14px; line-height: 1.6; background: #FFFFFF; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  #root { width: 100vw; min-height: 100vh; min-height: 100dvh; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="signin.jsx"></script>
<script type="text/babel">
  const OmayaSignIn = window.OmayaSignIn;

  function StateToggle({ value, onChange }) {
    const opts = [["default", "Default"], ["error", "Invalid credentials"]];
    return (
      <div style={{
        position: "fixed", top: 16, right: 16, zIndex: 50,
        display: "flex", gap: 2, padding: 3, borderRadius: 999,
        background: "#FFFFFF", border: "1px solid #D0D4DA",
        boxShadow: "0 4px 16px rgba(30,45,66,0.08)",
      }}>
        {opts.map(([k, label]) => {
          const active = value === k;
          return (
            <button key={k} type="button" onClick={() => onChange(k)} style={{
              border: "none", cursor: "pointer", borderRadius: 999,
              padding: "7px 14px", fontFamily: "Geist, sans-serif",
              fontSize: 13, fontWeight: 500,
              background: active ? "#1E2D42" : "transparent",
              color: active ? "#FFFFFF" : "#717D94",
              transition: "background .15s ease, color .15s ease",
            }}>{label}</button>
          );
        })}
      </div>
    );
  }

  function App() {
    const [state, setState] = React.useState("default");
    return (
      <React.Fragment>
        <StateToggle value={state} onChange={setState} />
        <OmayaSignIn state={state} />
      </React.Fragment>
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>

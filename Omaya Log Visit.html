<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Omaya — Log visit</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Instrument+Serif&display=swap"
            rel="stylesheet"
        />
        <template id="__bundler_thumbnail">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <rect width="100" height="100" fill="#ECE9E4" />
                <rect
                    x="24"
                    y="22"
                    width="52"
                    height="56"
                    rx="6"
                    fill="#fff"
                    stroke="#E4E7EC"
                />
                <rect
                    x="32"
                    y="32"
                    width="28"
                    height="5"
                    rx="2.5"
                    fill="#1E2D42"
                />
                <rect
                    x="32"
                    y="44"
                    width="36"
                    height="8"
                    rx="3"
                    fill="#F1F1F4"
                />
                <rect
                    x="32"
                    y="56"
                    width="36"
                    height="8"
                    rx="3"
                    fill="#F1F1F4"
                />
                <rect
                    x="32"
                    y="68"
                    width="16"
                    height="6"
                    rx="3"
                    fill="#93406B"
                />
            </svg>
        </template>
        <style>
            html,
            body {
                margin: 0;
                padding: 0;
            }
            :root {
                --ui-font: "Inter", system-ui, -apple-system, sans-serif;
            }
            body {
                font-family: var(--ui-font);
                font-size: 14px;
                line-height: 1.6;
                background: #ece9e4;
                color: #1e2d42;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }
            * {
                box-sizing: border-box;
            }
            #root {
                width: 100vw;
                height: 100vh;
            }
            ::placeholder {
                color: #98a2b3;
            }
            @keyframes omPulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            @keyframes omCaret {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0;
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script
            src="https://unpkg.com/react@18.3.1/umd/react.development.js"
            integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
            integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
            crossorigin="anonymous"
        ></script>
        <script
            src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
            integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
            crossorigin="anonymous"
        ></script>

        <script type="text/babel" src="dash-foundation.jsx"></script>
        <script type="text/babel" src="dash-ui.jsx"></script>
        <script type="text/babel" src="dash-logvisit.jsx"></script>
        <script type="text/babel" src="design-canvas.jsx"></script>
        <script type="text/babel">
            const { DesignCanvas, DCSection, DCArtboard } = window;
            const { Scene } = window.LogVisit;

            const ABW = 720,
                ABH = 700;

            function App() {
                return (
                    <DesignCanvas>
                        <DCSection
                            id="logvisit"
                            title="Log visit — modal over the record"
                            subtitle="Filled while a mother waits · Ama Mensah, Day 7"
                        >
                            <DCArtboard
                                id="empty"
                                label="Empty"
                                width={ABW}
                                height={ABH}
                            >
                                <Scene state="empty" />
                            </DCArtboard>
                            <DCArtboard
                                id="error"
                                label="Validation error"
                                width={ABW}
                                height={ABH}
                            >
                                <Scene state="error" />
                            </DCArtboard>
                            <DCArtboard
                                id="success"
                                label="Success toast"
                                width={ABW}
                                height={ABH}
                            >
                                <Scene state="success" />
                            </DCArtboard>
                        </DCSection>
                    </DesignCanvas>
                );
            }

            ReactDOM.createRoot(document.getElementById("root")).render(
                <App />,
            );
        </script>
    </body>
</html>
